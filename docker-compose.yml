services:
  db:
    image: postgres:16-alpine
    container_name: atelie_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ}
    ports:
      - ${DB_PORT}:${DB_PORT}
    volumes:
      - ecommerce_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: "1"
    networks:
      - atelie-network

networks:
  atelie-network:
    driver: bridge

volumes:
  ecommerce_postgres_data:
